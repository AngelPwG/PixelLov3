<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelLov3!</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/script.js" ></script>
</head>
<body>
  <div id="preview">

    
    <img id="layer-piel" src="assets/BaseCuerpo1.png">
    
    <img id="layer-ropa" src="assets/ropaPrueba.png">
    <img id="layer-cuello" src="assets/">
    
    <img id="layer-ojos" src="assets/ojoAzul.png">
    
    <img id="layer-pelo" src="assets/cabelloPrueba.png">
    <img id="layer-lentes" src="">
    <img id="layer-fondo" src="assets/fondoPrueba.jpg">

    <section id="controls">
    <div class="category">
        <h4>Color de Piel</h4>
        <button onclick="changeLayer('layer-piel', 'piel/clara.png')">Clara</button>
        <button onclick="changeLayer('layer-piel', 'piel/oscura.png')">Oscura</button>
    </div>

    <div class="category">
        <h4>Cabello</h4>
        <div class="styles">
            <button onclick="changeLayer('layer-pelo', 'pelo/corto_negro.png')">Corto Negro</button>
            <button onclick="changeLayer('layer-pelo', 'pelo/corto_rubio.png')">Corto Rubio</button>
            <button onclick="changeLayer('layer-pelo', 'pelo/largo_negro.png')">Largo Negro</button>
        </div>
    </div>
    
    </section>
</div>
</main>
</body>
</html>
